<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | QuickServe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="text-center space-y-8 p-10 bg-white rounded-[3rem] shadow-2xl max-w-sm w-full mx-4">
        <div>
            <h1 class="text-3xl font-black text-gray-900 mb-2">QuickServe</h1>
            <p class="text-gray-500 font-medium">Scan to view our digital menu</p>
        </div>

        <a id="qr-link" href="#" class="block group">
            <div class="relative p-4 border-4 border-dashed border-orange-500 rounded-[2rem] transition-transform group-hover:scale-105">
                <img id="qr-code-img" src="" alt="Scan Me" class="w-64 h-64 mx-auto">
                <div class="absolute inset-0 flex items-center justify-center bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="bg-orange-600 text-white px-4 py-2 rounded-full font-bold shadow-lg">Click to Enter</span>
                </div>
            </div>
        </a>

        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Powered by QuickServe Labs</p>
    </div>

    <script>
        // 1. UPDATE YOUR IP HERE (Run 'ipconfig' in terminal)
        const MY_IP = "192.168.31.184"; 
        const PORT = 5000;
        
        // 2. The destination URL (Menu page with a Table ID)
        const menuUrl = `http://${MY_IP}:${PORT}/menu?table=1`;

        // 3. Apply to the image and the clickable link
        const qrImg = document.getElementById('qr-code-img');
        const qrLink = document.getElementById('qr-link');
        
        const qrSource = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(menuUrl)}`;
        
        qrImg.src = qrSource;
        qrLink.href = menuUrl;
    </script>
</body>
</html>
